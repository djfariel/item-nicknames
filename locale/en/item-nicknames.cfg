[mod-setting-description]
item-nicknames-definitions=Nicknames applied in-game. Paste the IN1 string exported from the editor into this setting, then restart Factorio.
item-nicknames-allow-mod-nicknames=When enabled, other mods can contribute nicknames through the Item Nicknames API. When disabled, API contributions are ignored; Custom Nicknames and nickname pack settings still apply.
item-nicknames-allow-mod-overwrite=When enabled, mods can remove nickname tokens from other mod contributions using the subtractive API. Custom Nicknames are always protected.

